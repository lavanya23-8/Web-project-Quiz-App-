<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="quiz-container">
    
    <!-- WELCOME SCREEN -->
    <div id="welcomeScreen">
      <h1>🎉 Welcome to Quiz World 🎉</h1>
      <p>Test your knowledge in English & Kannada</p>
      <button onclick="goToLogin()">Start</button>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" style="display:none;">
      <h1>🔑 Login</h1>
      <p>Enter your name to continue</p>
      <input type="text" id="username" placeholder="Your Name">
      <button onclick="goToLanguage()">Continue</button>
    </div>

    <!-- LANGUAGE SELECTION -->
    <div id="langScreen" style="display:none;">
      <h1>🌐 Choose Language</h1>
      <div class="lang-select">
        <button onclick="setLanguage('en')">English 🇮🇳</button>
        <button onclick="setLanguage('kn')">ಕನ್ನಡ 🇰🇳</button>
      </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quizScreen" style="display:none;">
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <p id="progress"></p>
      <div id="quiz"></div>
      <button id="nextBtn" onclick="nextQuestion()">Next ➡️</button>
    </div>

    <!-- RESULT SCREEN -->
    <div id="resultScreen" style="display:none;">
      <h2>🏆 Quiz Completed!</h2>
      <p id="finalScore"></p>
      <button onclick="restartQuiz()">Restart 🔄</button>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
